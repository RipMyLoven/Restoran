<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <h1 id="restaurantName">Restaurant</h1>
    </header>

    <div class="container">
        <section id="info">
            <h2>Info</h2>
            <div id="infoContent"></div>
        </section>

        <section id="menu">
            <h2>Menu</h2>
            <div>
                <button onclick="loadMenu()">All</button>
                <button onclick="loadMenu('eelroogad')">Starters</button>
                <button onclick="loadMenu('põhiroogad')">Main</button>
                <button onclick="loadMenu('magustoidud')">Desserts</button>
                <button onclick="loadMenu('joogid')">Drinks</button>
            </div>
            <div id="menuContent"></div>
        </section>

        <section id="tables">
            <h2>Tables</h2>
            <div id="tablesContent"></div>
        </section>

        <section id="stats">
            <h2>Statistics</h2>
            <div id="statsContent"></div>
        </section>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
