<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <button onclick="showSection('staff')">Staff Management</button>
            <button onclick="showSection('restaurant')">Restaurant Settings</button>
            <button onclick="showSection('archive')">Archive</button>
            <button onclick="showSection('stats')">Statistics</button>
        </nav>
    </header>

    <div class="container">
        <section id="staff" class="section">
            <h2>Staff Management</h2>
            
            <h3>Add New Staff</h3>
            <form id="staffForm">
                <input type="text" id="staffName" placeholder="Name" required>
                <select id="staffRole" required>
                    <option value="">Select Role</option>
                    <option value="waiter">Waiter</option>
                    <option value="kitchen">Kitchen</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit">Add Staff</button>
            </form>

            <h3>Current Staff</h3>
            <div id="staffList"></div>
        </section>

        <section id="restaurant" class="section" style="display:none">
            <h2>Restaurant Settings</h2>
            
            <form id="restaurantForm">
                <label>Name:</label>
                <input type="text" id="restName" placeholder="Restaurant Name">
                
                <label>Address:</label>
                <input type="text" id="restAddress" placeholder="Address">
                
                <label>Phone:</label>
                <input type="text" id="restPhone" placeholder="Phone">
                
                <label>Description:</label>
                <textarea id="restDescription" placeholder="Description"></textarea>
                
                <button type="submit">Update Settings</button>
            </form>
        </section>

        <section id="archive" class="section" style="display:none">
            <h2>Archive</h2>
            <div id="archiveList"></div>
        </section>

        <section id="stats" class="section" style="display:none">
            <h2>Statistics</h2>
            <div id="statsContent"></div>
        </section>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
